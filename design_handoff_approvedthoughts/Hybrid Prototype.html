<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#b04a2f",
  "paper": "#f4efe6",
  "headFont": "hanken-grotesk",
  "bodyFont": "literata",
  "accentLevel": "high",
  "rule": "hairline",
  "singleFont": true,
  "singleFontChoice": "nunito-sans",
  "wordmarkOverride": true,
  "wordmarkFont": "atkinson",
  "bodyWeight": 300
}/*EDITMODE-END*/;

// Sans options sorted from narrow/light to wide/soft.
const SANS_FONTS = {
  "inter-tight":          { label: "Inter Tight — narrow, modern",       stack: `'Inter Tight', sans-serif`,            italic: false },
  "plex-condensed":       { label: "IBM Plex Sans Condensed — narrow",   stack: `'IBM Plex Sans Condensed', sans-serif`, italic: false },
  "barlow":               { label: "Barlow — slightly condensed",        stack: `'Barlow', sans-serif`,                  italic: false },
  "archivo":              { label: "Archivo — geometric, narrow",        stack: `'Archivo', sans-serif`,                 italic: false },
  "fira-sans":            { label: "Fira Sans — humanist, narrow",       stack: `'Fira Sans', sans-serif`,               italic: false },
  "sora":                 { label: "Sora — clean, slightly narrow",      stack: `'Sora', sans-serif`,                    italic: false },
  "hanken-grotesk":       { label: "Hanken Grotesk — calm grotesque",    stack: `'Hanken Grotesk', sans-serif`,          italic: false },
  "public-sans":          { label: "Public Sans — neutral, calm",        stack: `'Public Sans', sans-serif`,             italic: false },
  "inter":                { label: "Inter — standard",                   stack: `'Inter', sans-serif`,                   italic: false },
  "work-sans":            { label: "Work Sans — wide, friendly",         stack: `'Work Sans', sans-serif`,               italic: false },
  "manrope":              { label: "Manrope — wide, modern",             stack: `'Manrope', sans-serif`,                 italic: false },
  "dm-sans":              { label: "DM Sans — wide, soft",               stack: `'DM Sans', sans-serif`,                 italic: false },
  "outfit":               { label: "Outfit — geometric",                 stack: `'Outfit', sans-serif`,                  italic: false },
  "mulish":               { label: "Mulish — rounded",                   stack: `'Mulish', sans-serif`,                  italic: false },
  "plus-jakarta":         { label: "Plus Jakarta Sans — wide",           stack: `'Plus Jakarta Sans', sans-serif`,       italic: false },
  "nunito-sans":          { label: "Nunito Sans — wide, friendly",       stack: `'Nunito Sans', sans-serif`,             italic: false },
  "atkinson":             { label: "Atkinson Hyperlegible",              stack: `'Atkinson Hyperlegible', sans-serif`,   italic: false },
};

// Serifs ordered roughly from MOST READABLE / LEAST ORNATE to most editorial.
const SERIF_FONTS = {
  "literata":        { label: "Literata — modern, very readable",        stack: `'Literata', Georgia, serif`,          italic: true },
  "source-serif":    { label: "Source Serif — neutral, screen-friendly", stack: `'Source Serif 4', Georgia, serif`,    italic: true },
  "bitter":          { label: "Bitter — slab, sturdy, open",             stack: `'Bitter', Georgia, serif`,            italic: true },
  "merriweather":    { label: "Merriweather — wide, screen-tuned",       stack: `'Merriweather', Georgia, serif`,      italic: true },
  "libre-caslon":    { label: "Libre Caslon — classic, calm",            stack: `'Libre Caslon Text', Georgia, serif`, italic: true },
  "libre-baskerville": { label: "Libre Baskerville — open, classic",     stack: `'Libre Baskerville', Georgia, serif`, italic: true },
  "pt-serif":        { label: "PT Serif — neutral, transparent",         stack: `'PT Serif', Georgia, serif`,          italic: true },
  "newsreader":      { label: "Newsreader — editorial",                  stack: `'Newsreader', Georgia, serif`,        italic: true },
  "lora":            { label: "Lora — friendly, calligraphic",           stack: `'Lora', Georgia, serif`,              italic: true },
  "eb-garamond":     { label: "EB Garamond — classical, airy",           stack: `'EB Garamond', Georgia, serif`,       italic: true },
  "crimson":         { label: "Crimson Pro — book-like",                 stack: `'Crimson Pro', Georgia, serif`,       italic: true },
  "spectral":        { label: "Spectral — editorial, refined",           stack: `'Spectral', Georgia, serif`,          italic: true },
  "ibm-plex":        { label: "IBM Plex Serif — technical",              stack: `'IBM Plex Serif', Georgia, serif`,    italic: true },
  "fraunces":        { label: "Fraunces — distinctive",                  stack: `'Fraunces', Georgia, serif`,          italic: true },
};

function Hybrid({ t }) {
  const single = t.singleFont;
  // Combined pool for single-font choice (sans first, then serifs)
  const ALL_FONTS = { ...SANS_FONTS, ...SERIF_FONTS };
  const single_f = ALL_FONTS[t.singleFontChoice] || SANS_FONTS["public-sans"];
  const head = single ? single_f : SANS_FONTS[t.headFont];
  const body = single ? single_f : SERIF_FONTS[t.bodyFont];
  const wordmark = t.wordmarkOverride ? (ALL_FONTS[t.wordmarkFont] || SANS_FONTS["atkinson"]) : head;

  // Accent level controls how much terracotta is used.
  // low: only links/hover. medium: + dates, sidebar headings, list numerals, wordmark accent.
  // high: + tags, permalinks, recent dates.
  const A = t.accentLevel;
  const useAccentDates = A === 'medium' || A === 'high';
  const useAccentSideHead = A === 'medium' || A === 'high';
  const useAccentMark = A === 'medium' || A === 'high';
  const useAccentTags = A === 'high';
  const useAccentPermalink = A === 'high';
  const useAccentRecentDate = A === 'high';

  const css = `
.hy-root {
  --paper: ${t.paper};
  --paper-2: color-mix(in srgb, ${t.paper} 88%, #000 4%);
  --ink: #2a241d;
  --ink-2: #685c4d;
  --ink-3: #9b9082;
  --rule: #d8cfbe;
  --rule-soft: #e3dccd;
  --accent: ${t.accent};
  --accent-soft: color-mix(in srgb, ${t.accent} 70%, #fff 30%);
  --f-head: ${head.stack};
  --f-body: ${body.stack};
  --f-mark: ${wordmark.stack};
  --w-body: ${t.bodyWeight};
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-head);
  font-size: 16px;
  line-height: 1.6;
  font-feature-settings: "kern","liga";
  width: 100%; min-height: 100%;
}
.hy-root a { color: inherit; text-decoration: none; }
.hy-root a.inline { color: var(--accent); border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }
.hy-root a.inline:hover { border-bottom-color: var(--accent); }

/* HEADER — wordmark centered over reading column, not page.
   Reading column is the left grid track; full body is 1120px max with 56px gutters
   and 240px sidebar + 64px gap on the right. */
.hy-header {
  padding: 56px 56px 28px;
  border-bottom: 1px solid var(--rule);
  position: relative;
  max-width: 1120px;
  margin: 0 auto;
}
.hy-header-inner {
  /* Match body grid so wordmark sits in the reading column */
  display: grid;
  grid-template-columns: minmax(0,1fr) 240px;
  gap: 64px;
}
.hy-header-col {
  text-align: center;
  position: relative;
  padding-bottom: 4px;
}
.hy-header-col::after {
  content:''; position:absolute; left:50%; bottom:-30px; transform:translateX(-50%);
  width:56px; height:3px; background:var(--accent);
}
.hy-name {
  font-family: var(--f-mark);
  font-size: 44px;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1;
}
.hy-name em {
  ${useAccentMark ? 'color: var(--accent);' : ''}
  font-style: normal; font-weight: 600;
}
.hy-nav {
  display: flex; gap: 32px; justify-content: center; margin-top: 26px;
  font-family: var(--f-head); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
}
.hy-nav a { color: var(--ink-2); padding-bottom: 6px; border-bottom: 1px solid transparent; }
.hy-nav a.active { color: var(--ink); border-bottom-color: var(--accent); }

/* BODY GRID */
.hy-body {
  display: grid; grid-template-columns: minmax(0,1fr) 240px;
  gap: 64px; max-width: 1120px; margin: 0 auto; padding: 48px 56px 56px;
}

/* ENTRIES */
.hy-entry {
  padding: 32px 0 36px;
  border-bottom: 1px solid var(--rule-soft);
  display: grid; grid-template-columns: 110px minmax(0,1fr); gap: 28px; align-items: baseline;
}
.hy-entry:first-child { padding-top: 0; }
.hy-entry:last-child { border-bottom: none; }

.hy-rail {
  font-family: var(--f-head);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  line-height: 1.6; padding-top: 6px;
  color: var(--ink-2);
}
.hy-rail .date { display: block; ${useAccentDates ? 'color: var(--accent);' : 'color: var(--ink);'} font-weight: 500; }
.hy-rail .read { display: block; margin-top: 4px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: none; font-size: 11px; }

.hy-title {
  font-family: var(--f-head);
  font-size: 30px; font-weight: 500; letter-spacing: -0.015em; line-height: 1.2;
  margin: 0 0 12px;
}
.hy-title a:hover { color: var(--accent); }
.hy-dek {
  font-family: var(--f-body);
  color: var(--ink-2);
  margin: 0 0 18px; max-width: 60ch; text-wrap: pretty;
}
.hy-prose {
  font-family: var(--f-body);
  color: var(--ink);
  max-width: 60ch; text-wrap: pretty;
  font-weight: var(--w-body);
}
.hy-prose p { margin: 0 0 1em; }
.hy-dek, .hy-link-quote, .hy-tweet-body { font-weight: var(--w-body); }

/* LINK LIST */
.hy-list { list-style: none; padding: 0; margin: 8px 0 18px; counter-reset: hyl; }
.hy-list li {
  counter-increment: hyl;
  padding: 16px 0 16px 38px;
  position: relative;
  border-top: 1px solid var(--rule-soft);
}
.hy-list li:first-child { border-top: none; padding-top: 4px; }
.hy-list li:first-child::before { top: 5px; }
.hy-list li::before {
  content: counter(hyl, decimal-leading-zero);
  position: absolute; left: 0; top: 18px;
  font-family: var(--f-head); font-size: 10px;
  ${useAccentMark ? 'color: var(--accent);' : 'color: var(--ink-3);'}
  letter-spacing: 0.1em;
  font-weight: 500;
}
.hy-link-title {
  font-family: var(--f-head); font-size: 16.5px; font-weight: 500;
  display: block; margin-bottom: 4px; color: var(--ink);
}
.hy-link-title:hover { color: var(--accent); }
.hy-link-host {
  font-family: var(--f-head); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; display: block;
}
.hy-link-quote {
  font-family: var(--f-body);
  font-size: 15px; color: var(--ink-2);
  ${body.italic ? 'font-style: italic;' : ''}
  line-height: 1.6;
  border-left: 2px solid var(--accent-soft); padding-left: 14px; margin: 0; text-wrap: pretty;
}
.hy-dek, .hy-prose p {
  /* match the calmer scale used in link quotes */
  font-size: 15px;
  line-height: 1.65;
}

/* EMBEDS */
.hy-figure {
  margin: 22px 0 8px;
  max-width: 60ch;
}
.hy-figure figcaption {
  font-family: var(--f-head);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-3);
  padding-top: 10px;
  margin-top: 10px;
  border-top: 1px solid var(--rule-soft);
}
.hy-tweet {
  border: 1px solid var(--rule);
  background: color-mix(in srgb, var(--paper) 92%, #fff 8%);
  padding: 18px 20px;
  display: grid; grid-template-columns: 44px minmax(0,1fr); gap: 12px;
}
.hy-tweet-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent-soft);
  display: grid; place-items: center;
  font-family: var(--f-head); font-size: 14px; color: #fff; font-weight: 600;
}
.hy-tweet-meta {
  font-family: var(--f-head); font-size: 13px; line-height: 1.4;
  margin-bottom: 6px;
}
.hy-tweet-meta .name { font-weight: 600; color: var(--ink); }
.hy-tweet-meta .handle { color: var(--ink-3); margin-left: 6px; }
.hy-tweet-body {
  font-family: var(--f-body); font-size: 15px; line-height: 1.55; color: var(--ink);
  margin: 0 0 8px;
}
.hy-tweet-foot {
  font-family: var(--f-head); font-size: 11px; letter-spacing: 0.06em; color: var(--ink-3);
}
.hy-tweet-img {
  margin: 12px 0 10px;
  border: 1px solid var(--rule);
  aspect-ratio: 16 / 10;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, var(--paper)) 0%, var(--paper-2) 100%);
  position: relative;
  display: grid; place-items: center;
}
.hy-tweet-img-label {
  font-family: var(--f-head); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-3);
}

.hy-yt {
  position: relative;
  border: 1px solid var(--rule);
  background: #2a241d;
  aspect-ratio: 16 / 9;
  display: grid; place-items: center;
  overflow: hidden;
}
.hy-yt::before {
  content:''; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 30% 40%, rgba(176,74,47,.35), transparent 55%),
    radial-gradient(circle at 75% 65%, rgba(255,200,150,.18), transparent 60%),
    linear-gradient(135deg, #1f1a14, #3a2e22);
}
.hy-yt-play {
  position: relative;
  width: 64px; height: 64px;
  background: var(--paper);
  border-radius: 50%;
  display: grid; place-items: center;
  box-shadow: 0 6px 24px rgba(0,0,0,.35);
}
.hy-yt-play::after {
  content:''; width: 0; height: 0;
  border-left: 18px solid var(--accent);
  border-top: 11px solid transparent;
  border-bottom: 11px solid transparent;
  margin-left: 4px;
}
.hy-yt-label {
  position: absolute; left: 16px; bottom: 14px;
  font-family: var(--f-head); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,.85);
}
.hy-yt-title {
  position: absolute; right: 16px; bottom: 14px; max-width: 60%;
  font-family: var(--f-head); font-size: 13px; color: rgba(255,255,255,.95); text-align: right;
  font-weight: 500;
}

.hy-img {
  border: 1px solid var(--rule);
  aspect-ratio: 16 / 10;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 25%, var(--paper)) 0%, var(--paper-2) 100%);
  position: relative;
  display: grid; place-items: center;
}
.hy-img::after {
  content:'IMAGE';
  font-family: var(--f-head); font-size: 11px; letter-spacing: 0.24em; color: var(--ink-3);
}

/* ENTRY FOOT */
.hy-foot {
  display: flex; justify-content: space-between; align-items: center; margin-top: 18px;
  font-family: var(--f-head); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-3);
}
.hy-tags { display: flex; gap: 16px; }
.hy-tags a { color: ${useAccentTags ? 'var(--accent)' : 'var(--ink-2)'}; }
.hy-tags a:hover { color: var(--accent); }
.hy-more { color: ${useAccentPermalink ? 'var(--accent)' : 'var(--ink-2)'}; font-weight: 500; }
.hy-more:hover { color: var(--accent); }

/* SIDEBAR */
.hy-side { font-family: var(--f-head); font-size: 14.5px; }
.hy-side > section { margin-bottom: 36px; }
.hy-side h3 {
  font-family: var(--f-head);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin: 0 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid ${useAccentSideHead ? 'var(--accent)' : 'var(--ink)'};
  color: ${useAccentSideHead ? 'var(--accent)' : 'var(--ink)'};
}
.hy-side ul { list-style: none; padding: 0; margin: 0; }
.hy-side li { padding: 6px 0; border-bottom: 1px dotted var(--rule); }
.hy-side li:last-child { border-bottom: none; }
.hy-recent-title {
  font-family: var(--f-head); font-size: 13.5px; line-height: 1.3;
  color: var(--ink); display: block; font-weight: 500;
}
.hy-recent-date {
  font-family: var(--f-head); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: ${useAccentRecentDate ? 'var(--accent)' : 'var(--ink-3)'};
  margin-top: 2px; display: block;
}
.hy-side a:hover .hy-recent-title { color: var(--accent); }
.hy-elsewhere a {
  display: flex; justify-content: space-between; padding: 3px 0;
  font-family: var(--f-head); font-size: 13.5px; color: var(--ink);
}
.hy-elsewhere a::after { content: '↗'; color: var(--ink-3); font-size: 12px; }
.hy-elsewhere a:hover { color: var(--accent); }
.hy-search {
  background: var(--paper-2); border: 1px solid var(--rule); padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.hy-search input {
  border: none; outline: none; background: transparent; font: inherit;
  font-family: var(--f-head); flex: 1; color: var(--ink);
}
.hy-search input::placeholder { color: var(--ink-3); }

/* FOOTER */
.hy-footer {
  background: var(--paper-2);
  padding: 28px 56px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--f-head); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-2); border-top: 3px double var(--rule);
}
.hy-footer .seal {
  font-family: var(--f-head); font-size: 13px; font-weight: 500;
  letter-spacing: 0.06em; text-transform: none; color: var(--ink);
}
.hy-footer .links { display: flex; gap: 24px; }
.hy-footer a { color: var(--ink-2); }
.hy-footer a:hover { color: var(--accent); }
`;

  return (
    <>
      <style>{css}</style>
      <div className="hy-root">
        <header className="hy-header">
          <div className="hy-header-inner">
            <div className="hy-header-col">
              <div className="hy-name">Approved <em>Thoughts</em></div>
              <nav className="hy-nav">
                <a href="#" className="active">Home</a>
                <a href="#">About</a>
                <a href="#">Archives</a>
              </nav>
            </div>
            <div></div>
          </div>
        </header>

        <div className="hy-body">
          <main>
            {/* Entry 1: Links (full inline) */}
            <Entry post={window.SAMPLE_POSTS[0]} />

            {/* Entry 2: Long post (excerpt + image) */}
            <Entry post={window.SAMPLE_POSTS[1]} extra={(
              <figure className="hy-figure">
                <div className="hy-img"></div>
                <figcaption>Fig. 1 — A diagram of the model's response to a prompt.</figcaption>
              </figure>
            )} />

            {/* Entry 3: Thought piece with tweet embed (with screenshot) */}
            <Entry post={window.SAMPLE_POSTS[3]} extra={(
              <figure className="hy-figure">
                <div className="hy-tweet">
                  <div className="hy-tweet-avatar">PS</div>
                  <div>
                    <div className="hy-tweet-meta">
                      <span className="name">Patrick Stokes</span>
                      <span className="handle">@patstokes · Apr 14</span>
                    </div>
                    <p className="hy-tweet-body">
                      A book is a machine for slowing you down. The medium is the argument:
                      that some ideas can't be skimmed. You walk the length of them or you
                      don't get them at all.
                    </p>
                    <div className="hy-tweet-img">
                      <span className="hy-tweet-img-label">Attached image</span>
                    </div>
                    <div className="hy-tweet-foot">12:04 PM · 1.2K reposts · 8.7K likes</div>
                  </div>
                </div>
                <figcaption>From a thread on patient reading.</figcaption>
              </figure>
            )} />

            {/* Entry 4: Notes with YouTube embed */}
            <Entry post={window.SAMPLE_POSTS[4]} extra={(
              <figure className="hy-figure">
                <div className="hy-yt">
                  <div className="hy-yt-play"></div>
                  <span className="hy-yt-label">YouTube · 14:22</span>
                  <span className="hy-yt-title">Rob Burbea on the jhanas — Hermes Amāra</span>
                </div>
                <figcaption>Talk referenced in the third sit.</figcaption>
              </figure>
            )} />
          </main>

          <aside className="hy-side">
            <section>
              <h3>Recent</h3>
              <ul>
                {window.RECENT_POSTS.map((r, i) => (
                  <li key={i}><a href="#">
                    <span className="hy-recent-title">{r.title}</span>
                    <span className="hy-recent-date">{r.date}</span>
                  </a></li>
                ))}
              </ul>
            </section>
            <section className="hy-elsewhere">
              <h3>Elsewhere</h3>
              <ul>{window.ELSEWHERE.map((e, i) => <li key={i}><a href={e.url}>{e.name}</a></li>)}</ul>
            </section>
            <section>
              <h3>Search</h3>
              <div className="hy-search"><input placeholder="Search posts…" /></div>
            </section>
          </aside>
        </div>

        <footer className="hy-footer">
          <span className="seal">Approved Thoughts · MMXXVI</span>
          <div className="links">
            <a href="#">RSS</a><a href="#">JSON</a><a href="#">Sitemap</a>
          </div>
        </footer>
      </div>
    </>
  );
}

function Entry({ post, extra }) {
  return (
    <article className="hy-entry">
      <div className="hy-rail">
        <span className="date">{post.date}</span>
        <span className="read">{post.readTime}</span>
      </div>
      <div>
        <h2 className="hy-title"><a href="#">{post.title}</a></h2>
        {!post.isLinks && <p className="hy-dek">{post.excerpt}</p>}
        {post.isLinks && (
          <ol className="hy-list">
            {post.linkItems.map((li, j) => (
              <li key={j}>
                <a className="hy-link-title" href="#">{li.title}</a>
                <span className="hy-link-host">{li.host}</span>
                <p className="hy-link-quote">{li.quote}</p>
              </li>
            ))}
          </ol>
        )}
        {extra}
        <div className="hy-foot">
          <div className="hy-tags">
            {post.tags.map((tg) => <a key={tg} href="#">#{tg}</a>)}
          </div>
          <a href="#" className="hy-more">{post.isLinks ? 'Permalink →' : 'Continue reading →'}</a>
        </div>
      </div>
    </article>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <Hybrid t={t} />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Type" />
        <TweakToggle label="Single font everywhere" value={t.singleFont}
          onChange={(v) => setTweak('singleFont', v)} />
        {t.singleFont ? (
          <TweakSelect label="Choose one font" value={t.singleFontChoice}
            options={[
              ...Object.entries(SANS_FONTS).map(([value, v]) => ({ value, label: 'Sans · ' + v.label })),
              ...Object.entries(SERIF_FONTS).map(([value, v]) => ({ value, label: 'Serif · ' + v.label })),
            ]}
            onChange={(v) => setTweak('singleFontChoice', v)} />
        ) : (
          <>
            <TweakSelect label="Heading & UI font (sans)" value={t.headFont}
              options={Object.entries(SANS_FONTS).map(([value, v]) => ({ value, label: v.label }))}
              onChange={(v) => setTweak('headFont', v)} />
            <TweakSelect label="Body font (serif, for prose)" value={t.bodyFont}
              options={Object.entries(SERIF_FONTS).map(([value, v]) => ({ value, label: v.label }))}
              onChange={(v) => setTweak('bodyFont', v)} />
          </>
        )}
        <TweakToggle label="Override wordmark font" value={t.wordmarkOverride}
          onChange={(v) => setTweak('wordmarkOverride', v)} />
        {t.wordmarkOverride && (
          <TweakSelect label="Wordmark font" value={t.wordmarkFont}
            options={[
              ...Object.entries(SANS_FONTS).map(([value, v]) => ({ value, label: 'Sans · ' + v.label })),
              ...Object.entries(SERIF_FONTS).map(([value, v]) => ({ value, label: 'Serif · ' + v.label })),
            ]}
            onChange={(v) => setTweak('wordmarkFont', v)} />
        )}
        <TweakRadio label="Body weight" value={t.bodyWeight}
          options={[
            { label: 'Light (300)', value: 300 },
            { label: 'Regular (400)', value: 400 },
            { label: 'Medium (500)', value: 500 },
          ]}
          onChange={(v) => setTweak('bodyWeight', v)} />
        <div style={{ fontSize: 11, color: 'rgba(41,38,27,.6)', padding: '2px 0 4px', lineHeight: 1.4 }}>
          Sans options sorted from <em>narrow/light</em> (top) to <em>wide/soft</em> (bottom). Try Light weight to lessen the visual heft.
        </div>

        <TweakSection label="Color" />
        <TweakColor label="Accent" value={t.accent} onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Accent presets" value={t.accent}
          options={[
            { label: 'Terracotta', value: '#b04a2f' },
            { label: 'Oxblood', value: '#7a1f1a' },
            { label: 'Ochre', value: '#a87420' },
            { label: 'Forest', value: '#2f5a3f' },
            { label: 'Slate', value: '#3a4a5e' },
          ]}
          onChange={(v) => setTweak('accent', v)} />
        <TweakColor label="Paper" value={t.paper} onChange={(v) => setTweak('paper', v)} />
        <TweakSelect label="Paper presets" value={t.paper}
          options={[
            { label: 'Pure white',         value: '#ffffff' },
            { label: 'Snow',               value: '#fbfaf7' },
            { label: 'Eggshell',           value: '#faf7f1' },
            { label: 'Bone',               value: '#faf6ed' },
            { label: 'Linen',              value: '#f7f3ea' },
            { label: 'Warm cream',         value: '#f4efe6' },
            { label: 'Buttermilk',         value: '#f3eddc' },
            { label: 'Parchment',          value: '#efe8d6' },
            { label: 'Sand',               value: '#ece4cf' },
            { label: 'Cool stone',         value: '#f1efe9' },
            { label: 'Cool grey',          value: '#eeede8' },
            { label: 'Mist (cool white)',  value: '#f4f5f3' },
            { label: 'Pale blue',          value: '#f1f3f4' },
            { label: 'Pale sage',          value: '#eef0e8' },
            { label: 'Pale rose',          value: '#f6efe9' },
          ]}
          onChange={(v) => setTweak('paper', v)} />
        <TweakRadio label="Accent intensity" value={t.accentLevel}
          options={[
            { label: 'Low', value: 'low' },
            { label: 'Medium', value: 'medium' },
            { label: 'High', value: 'high' },
          ]}
          onChange={(v) => setTweak('accentLevel', v)} />
        <div style={{ fontSize: 11, color: 'rgba(41,38,27,.6)', padding: '2px 0 4px', lineHeight: 1.4 }}>
          Low: links only.
          Medium: + dates, sidebar headings, list numerals, "Thoughts" wordmark.
          High: + tags, permalinks, recent dates.
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
